<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌍 Eternal Realm - AI World Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>⚔️ ETERNAL REALM</h1>
                <p class="subtitle">AI-Driven World Simulation</p>
            </div>
            
            <div class="controls">
                <h3>🎮 Controls</h3>
                <button class="btn btn-primary" onclick="startSimulation()">▶️ Start</button>
                <button class="btn btn-secondary" onclick="pauseSimulation()">⏸️ Pause</button>
                <button class="btn btn-secondary" onclick="resetSimulation()">🔄 Reset</button>
                <div class="speed-control">
                    <label>Speed:</label>
                    <input type="range" min="0.5" max="3" step="0.5" value="1" id="speedSlider" onchange="setGameSpeed(this.value)">
                    <span id="speedDisplay">1x</span>
                </div>
            </div>
            
            <div class="stats-panel">
                <h3>📊 World Stats</h3>
                <div class="stat-item">
                    <span class="label">Year:</span>
                    <span class="value" id="yearValue">0</span>
                </div>
                <div class="stat-item">
                    <span class="label">Population:</span>
                    <span class="value" id="popValue">0</span>
                </div>
                <div class="stat-item">
                    <span class="label">Happy Citizens:</span>
                    <span class="value" id="happyValue">0</span>
                </div>
                <div class="stat-item">
                    <span class="label">FPS:</span>
                    <span class="value" id="fpsValue">60</span>
                </div>
            </div>
            
            <div class="characters-panel">
                <h3>👥 Characters</h3>
                <div id="characterList" class="character-list"></div>
            </div>
            
            <div class="events-log">
                <h3>📜 Events</h3>
                <div id="eventLog" class="log-container"></div>
            </div>
            
            <footer class="sidebar-footer">
                <a href="dashboard.html" class="btn btn-accent">📊 Open Dashboard</a>
                <p class="footer-text">v1.0 | By lugardlugard7-code</p>
            </footer>
        </aside>
        
        <main class="game-area">
            <canvas id="gameCanvas"></canvas>
            <div class="canvas-info">
                Click on characters to select them
            </div>
        </main>
    </div>
    
    <script src="game.js"></script>
    <script src="script.js"></script>
</body>
</html>
